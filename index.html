<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SendShield</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="app">

    <div class="card">

      <div class="hero">
        <div class="shield">🛡️</div>

        <h1>SendShield</h1>

        <p class="subtitle">
          Prevent scams before you send crypto.
        </p>
      </div>

      <div class="badges">
        <span>Scam Detection</span>
        <span>Sanctions Screening</span>
        <span>Wallet Verification</span>
      </div>

      <form id="riskForm">

        <input
          type="text"
          id="walletAddress"
          placeholder="Paste recipient wallet address"
          required
        >

        <select id="network" required>
          <option value="">Select Network</option>
          <option value="Ethereum">Ethereum</option>
          <option value="Polygon">Polygon</option>
          <option value="Arbitrum">Arbitrum</option>
          <option value="Base">Base</option>
        </select>

        <button type="submit">
          Check Wallet
        </button>

      </form>

      <section id="result"></section>

    </div>

  </main>

  <script src="script.js"></script>

</body>
</html>
